<%+header%>

<%
local http = require "luci.http"
local cookie_header = os.getenv("HTTP_COOKIE")
%>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5G联通未来-马上有房出品</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    #loadingMessage {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: white;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #666;
    }
    #embeddedPageContainer {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    #embeddedPage {
      width: 100%;
      height: 100vh;
      border: none;
      transform: translateY(-570px);
    }
    footer, header .fill { display: none !important; height: 0 !important; }
    .main-right > #maincontent > .container {
      margin: 0 !important;
      flex-grow: 1;
      padding: 0 !important;
      max-width: 100% !important;
      width: 100% !important;
    }
    .float-button {
      position: fixed;
      left: 10px;
      bottom: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: #007bff;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .float-button:hover { background-color: #0056b3; }
  </style>
</head>

<body>
  <div id="loadingMessage">正在加载5G管理界面...</div>
  <div id="embeddedPageContainer">
    <iframe id="embeddedPage" src="" onload="showHalfPage()"></iframe>
  </div>
  <button class="float-button" id="backBtn">返回</button>

  <script>
    function showHalfPage() {
      document.getElementById('loadingMessage').style.display = 'none';
      var embeddedPage = document.getElementById('embeddedPage');
      embeddedPage.style.transform = 'translateY(0)';
    }

    function initModemUI() {
      var hostname = window.location.hostname;
      var port = window.location.port || '80';
      var key = '<%=cookie_header or ""%>';
      var src = 'http://' + hostname + ':8080/#/login?url=' + hostname + '&port=' + port + '&key=' + encodeURIComponent(key);
      var iframe = document.getElementById('embeddedPage');
      iframe.onload = showHalfPage;
      iframe.src = src;
    }

    document.getElementById('backBtn').onclick = function() {
      window.location.href = '/cgi-bin/luci';
    };

    window.onload = initModemUI;
  </script>
</body>
<%+footer%>
