<%+header%>
<style type="text/css">
    #warning_message_box {
        margin: 1rem;
        padding: 1rem;
        height: auto;
    }
    .table { display: table; }
    .cbi-progressbar, .compat-progressbar {
        border: 1px solid var(--border-color-high,var(--progressbarColor,var(--background-color)));
        border-radius: 3px;
        position: relative;
        min-width: 170px;
        height: 8px;
        margin: 1.4em 0 4px 0;
        background: var(--background-color-medium,var(--progressbarColor));
    }
    .cbi-progressbar > div, .compat-progressbar > div {
        background: var(--progressbar, var(--primary, var(--primary-color-medium)));
        height: 100%;
        transition: width .25s ease-in;
        width: 0%;
        border-radius: 2px;
    }
    .cbi-progressbar::before, .compat-progressbar::before {
        position: absolute;
        top: -1.4em;
        left: 0;
        content: attr(title);
        white-space: pre;
        overflow: hidden;
        text-overflow: ellipsis;
    }
</style>

<script>
function hasCssClass(className) {
    var styleSheets = document.styleSheets;
    for (var i = 0; i < styleSheets.length; i++) {
        var rules = styleSheets[i].cssRules || styleSheets[i].rules;
        for (var j = 0; j < rules.length; j++) {
            if (rules[j].selectorText && rules[j].selectorText.includes(className)) {
                return true;
            }
        }
    }
    return false;
}

var progressbarClass = hasCssClass('.cbi-progressbar') ? 'cbi-progressbar' : 'compat-progressbar';

class LuciTable {
    constructor() {
        this.rows = [];
        this.tbody = null;
        this.fieldset = null;
        this.init_table();
    }
    init_table() {
        var fieldset = document.createElement('fieldset');
        fieldset.className = 'cbi-section';
        var legend = document.createElement('legend');
        var titleSpan = document.createElement('h2');
        titleSpan.className = 'panel-title';
        var table = document.createElement('table');
        table.className = 'table';
        var tbody = document.createElement('tbody');
        tbody.style.width = '100%';
        table.appendChild(tbody);
        fieldset.appendChild(legend);
        fieldset.appendChild(titleSpan);
        fieldset.appendChild(table);
        this.fieldset = fieldset;
        this.tbody = tbody;
        this.legend = legend;
        this.titleSpan = titleSpan;
    }
    new_tr(data, index) {
        var type = data.type;
        if (type === 'plain_text') {
            this.rows[index].left.innerHTML = data.full_name || data.key;
            this.rows[index].right.innerHTML = data.value;
            this.rows[index].row.style.display = (data.value == null || data.value === '') ? 'none' : '';
        } else if (type === 'progress_bar') {
            var title = '(' + data.value + '/' + data.max_value + data.unit + ')';
            var pct = ((data.value - data.min_value) / (data.max_value - data.min_value)) * 100;
            this.rows[index].left.innerHTML = data.full_name || data.key;
            var pb = document.createElement('div');
            pb.className = progressbarClass;
            pb.title = title;
            var pbb = document.createElement('div');
            pbb.style.width = pct + '%';
            pb.appendChild(pbb);
            this.rows[index].right.innerHTML = '';
            this.rows[index].right.appendChild(pb);
        }
    }
    set title(v) { this.legend.innerHTML = v; this.titleSpan.innerHTML = v; }
    set object_data(v) {
        var rl = this.rows.length, vl = Object.keys(v).length;
        if (rl < vl) {
            for (var i = rl; i < vl; i++) {
                var row = document.createElement('tr');
                row.className = 'tr';
                var cl = document.createElement('td'); cl.className = 'td left'; cl.setAttribute('width', '33%');
                var cr = document.createElement('td'); cr.className = 'td';
                row.appendChild(cl); row.appendChild(cr);
                this.tbody.appendChild(row);
                this.rows.push({ row: row, left: cl, right: cr });
            }
        } else if (rl > vl) {
            for (var i = vl; i < rl; i++) {
                this.tbody.removeChild(this.rows[i].row);
            }
            this.rows = this.rows.slice(0, vl);
        }
        var idx = 0;
        for (var key in v) {
            this.rows[idx].left.innerHTML = key;
            this.rows[idx].right.innerHTML = v[key];
            idx++;
        }
    }
    set array_data(v) {
        var rl = this.rows.length, vl = v.length;
        if (rl < vl) {
            for (var i = rl; i < vl; i++) {
                var row = document.createElement('tr');
                row.className = 'tr';
                var cl = document.createElement('td'); cl.className = 'td left'; cl.setAttribute('width', '33%');
                var cr = document.createElement('td'); cr.className = 'td';
                row.appendChild(cl); row.appendChild(cr);
                this.tbody.appendChild(row);
                this.rows.push({ row: row, left: cl, right: cr });
            }
        } else if (rl > vl) {
            for (var i = vl; i < rl; i++) {
                this.tbody.removeChild(this.rows[i].row);
            }
            this.rows = this.rows.slice(0, vl);
        }
        for (var i = 0; i < v.length; i++) { this.new_tr(v[i], i); }
    }
    set data(v) {
        if (v == null) return;
        if (Array.isArray(v)) this.array_data = v;
        else this.object_data = v;
    }
}

class ModemInfo {
    constructor() {
        this.data = null;
        this.cfg_id = null;
        this.tables = {};
        this.cbiMap = document.querySelector('.cbi-map');
        this.modemSelector = document.getElementById('modem_selector');
        this.cfg_options = [];
        this.modem_cfg_list = [];
        this.init_warning_message_box();
        this.create_modem_cfg_selector();
        this.update_modem_cfg_list();
    }
    init_warning_message_box() {
        var box = document.createElement('div');
        box.className = 'alert-message alert-danger';
        box.id = 'warning_message_box';
        var title = document.createElement('strong');
        title.innerHTML = '<%:Warning!%>';
        var msg = document.createElement('div');
        msg.id = 'warning_message';
        box.style.display = 'none';
        box.appendChild(title);
        box.appendChild(msg);
        this.cbiMap.appendChild(box);
        this.messageBox = msg;
        this.warningBox = box;
    }
    warning_message(nodes) {
        this.warningBox.style.display = '';
        this.messageBox.innerHTML = '';
        this.messageBox.appendChild(nodes);
    }
    hide_warning() { this.warningBox.style.display = 'none'; }
    create_modem_cfg_selector() {
        var sel = document.createElement('select');
        sel.addEventListener('change', function(e) {
            this.cfg_id = e.target.value;
            this.update();
        }.bind(this));
        this.modemSelector.appendChild(sel);
        this.selector = sel;
        this.poll_info();
    }
    poll_info() {
        if (this.cfg_id == null) return;
        XHR.poll(10, '<%=luci.dispatcher.build_url("admin", "modem", "qmodem", "modem_ctrl")%>', {
            cfg: this.cfg_id, action: 'info', translate: '1'
        }, function(x, data) { this.view = data; }.bind(this));
    }
    update() {
        XHR.get('<%=luci.dispatcher.build_url("admin", "modem", "qmodem", "modem_ctrl")%>', {
            cfg: this.cfg_id, action: 'info', translate: '1'
        }, function(x, data) { this.view = data; }.bind(this));
    }
    update_modem_cfg_list() {
        XHR.poll(5, '<%=luci.dispatcher.build_url("admin", "modem", "qmodem", "get_modem_cfg")%>', {},
            function(x, data) {
                var newList = [];
                try {
                    var cfgs = data.cfgs || [];
                    for (var i = 0; i < cfgs.length; i++) {
                        var c = cfgs[i];
                        var v = c.cfg + '|' + c.at_port + '|' + c.manufacturer + '|' + c.platform;
                        newList.push({ value: v, name: c.name });
                    }
                } catch(e) {}
                if (JSON.stringify(newList) !== JSON.stringify(this.modem_cfg_list)) {
                    this.cfg_options = newList;
                }
            }.bind(this));
    }
    set cfg_options(v) {
        if (v.length === 0) return;
        var sel = this.selector;
        for (var i = 0; i < v.length; i++) {
            var opt = sel.options[i] || document.createElement('option');
            if (!opt.parentNode) sel.appendChild(opt);
            opt.value = v[i].value;
            opt.innerHTML = v[i].name;
        }
        while (sel.options.length > v.length) sel.remove(sel.options.length - 1);
        this.cfg_id = sel.value;
        this.modem_cfg_list = v;
        this.update();
    }
    set view(data) {
        if (!data) return;
        var tablesMap = {};
        var warnings = [];
        for (var i = 0; i < data.length; i++) {
            var entry = data[i];
            if (entry.type === 'warning_message') {
                warnings.push(entry);
                continue;
            }
            if (!tablesMap[entry.class]) tablesMap[entry.class] = [];
            tablesMap[entry.class].push(entry);
        }
        for (var cls in tablesMap) {
            if (!this.tables[cls]) {
                this.tables[cls] = new LuciTable();
                this.cbiMap.appendChild(this.tables[cls].fieldset);
            }
            this.tables[cls].title = cls;
            this.tables[cls].data = tablesMap[cls];
        }
        for (var tbl in this.tables) {
            if (!tablesMap[tbl]) {
                this.cbiMap.removeChild(this.tables[tbl].fieldset);
                delete this.tables[tbl];
            }
        }
        if (warnings.length > 0) {
            var frag = document.createElement('div');
            for (var i = 0; i < warnings.length; i++) {
                var p = document.createElement('p');
                p.innerHTML = (warnings[i].full_name || warnings[i].key) + warnings[i].value;
                frag.appendChild(p);
            }
            this.warning_message(frag);
        } else {
            this.hide_warning();
        }
    }
}

window.onload = function() {
    new ModemInfo();
};
</script>
<div>
    <div class="cbi-map">
        <fieldset class="cbi-section">
            <table class="table">
                <tbody>
                    <tr class="tr">
                        <td class="td" width="33%"><%:Modem Name%></td>
                        <td class="td" id="modem_selector"></td>
                    </tr>
                </tbody>
            </table>
        </fieldset>
    </div>
</div>
<%+footer%>
