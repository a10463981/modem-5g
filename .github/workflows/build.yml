name: Build IPK

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file bc 2>&1 | tail -3
      - name: Download SDK
        run: |
          mkdir -p /opt/sdk-aarch64
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/armsr/armv8/openwrt-sdk-23.05.3-armsr-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz" \
            -O /tmp/sdk-aarch64.tar.xz
          tar xf /tmp/sdk-aarch64.tar.xz -C /opt/sdk-aarch64
      - name: Copy package
        run: |
          SDK_DIR=$(ls -d /opt/sdk-aarch64/*/ | head -1)
          echo "SDK directory: $SDK_DIR"
          # Copy only the package files (not .github, not git history)
          mkdir -p "$SDK_DIR/package/luci-app-modemserver"
          rsync -av --exclude='.git' --exclude='.github' \
            "${{ github.workspace }}/" \
            "$SDK_DIR/package/luci-app-modemserver/"
          echo "Package contents:"
          ls -la "$SDK_DIR/package/luci-app-modemserver/"
      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk-aarch64/*/ | head -1)
          cd "$SDK_DIR"
          make defconfig 2>/dev/null || true
          make package/luci-app-modemserver/compile V=s 2>&1 | tail -10
      - name: Find IPK
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk-aarch64/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-modemserver_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk_path=$IPK" >> $GITHUB_OUTPUT
          echo "Found IPK: $IPK"
          ls -lh "$IPK" 2>/dev/null || echo "IPK not found!"
      - name: Upload IPK
        if: steps.find.outputs.ipk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-modemserver-aarch64
          path: ${{ steps.find.outputs.ipk_path }}

  build-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file bc 2>&1 | tail -3
      - name: Download SDK
        run: |
          mkdir -p /opt/sdk-x86_64
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" \
            -O /tmp/sdk-x86_64.tar.xz
          tar xf /tmp/sdk-x86_64.tar.xz -C /opt/sdk-x86_64
      - name: Copy package
        run: |
          SDK_DIR=$(ls -d /opt/sdk-x86_64/*/ | head -1)
          mkdir -p "$SDK_DIR/package/luci-app-modemserver"
          rsync -av --exclude='.git' --exclude='.github' \
            "${{ github.workspace }}/" \
            "$SDK_DIR/package/luci-app-modemserver/"
      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk-x86_64/*/ | head -1)
          cd "$SDK_DIR"
          make defconfig 2>/dev/null || true
          make package/luci-app-modemserver/compile V=s 2>&1 | tail -10
      - name: Find IPK
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk-x86_64/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-modemserver_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk_path=$IPK" >> $GITHUB_OUTPUT
          ls -lh "$IPK" 2>/dev/null || echo "IPK not found!"
      - name: Upload IPK
        if: steps.find.outputs.ipk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-modemserver-x86_64
          path: ${{ steps.find.outputs.ipk_path }}

  build-armv7:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gcc gawk \
            libncurses5-dev libssl-dev perl-base python3 python3-distutils python3-yaml \
            rsync unzip wget xz-utils file bc 2>&1 | tail -3
      - name: Download SDK
        run: |
          mkdir -p /opt/sdk-armv7
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/armsr/armv7/openwrt-sdk-23.05.3-armsr-armv7_gcc-12.3.0_musl_eabi.Linux-x86_64.tar.xz" \
            -O /tmp/sdk-armv7.tar.xz
          tar xf /tmp/sdk-armv7.tar.xz -C /opt/sdk-armv7
      - name: Copy package
        run: |
          SDK_DIR=$(ls -d /opt/sdk-armv7/*/ | head -1)
          mkdir -p "$SDK_DIR/package/luci-app-modemserver"
          rsync -av --exclude='.git' --exclude='.github' \
            "${{ github.workspace }}/" \
            "$SDK_DIR/package/luci-app-modemserver/"
      - name: Build
        run: |
          SDK_DIR=$(ls -d /opt/sdk-armv7/*/ | head -1)
          cd "$SDK_DIR"
          make defconfig 2>/dev/null || true
          make package/luci-app-modemserver/compile V=s 2>&1 | tail -10
      - name: Find IPK
        id: find
        run: |
          SDK_DIR=$(ls -d /opt/sdk-armv7/*/ | head -1)
          IPK=$(find "$SDK_DIR" -name "luci-app-modemserver_*.ipk" -type f 2>/dev/null | head -1)
          echo "ipk_path=$IPK" >> $GITHUB_OUTPUT
          ls -lh "$IPK" 2>/dev/null || echo "IPK not found!"
      - name: Upload IPK
        if: steps.find.outputs.ipk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-modemserver-armv7
          path: ${{ steps.find.outputs.ipk_path }}

  release:
    permissions: write-all
    needs: [build-aarch64, build-x86_64, build-armv7]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all IPKs
        uses: actions/download-artifact@v4
        with:
          path: ./ipks
          merge-multiple: true
      - name: List downloaded files
        run: ls -lh ./ipks/
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for f in ./ipks/*.ipk; do
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber
          done
