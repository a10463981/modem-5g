name: Build IPK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Download ImmortalWrt SDK
        run: |
          mkdir -p sdk
          cd sdk
          wget --timeout=300 --tries=3 "https://downloads.immortalwrt.org/releases/23.05.3/targets/rockchip/armv8/immortalwrt-sdk-23.05.3-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O sdk.tar.xz
          tar xf sdk.tar.xz --strip-components=1
          echo "=== SDK Contents ==="
          ls -la
          echo "=== SDK Bin ==="
          ls bin/ 2>/dev/null || echo "No bin directory"

      - name: Link package into SDK
        run: |
          cd sdk
          mkdir -p package/luci-app-modemserver
          rm -rf package/luci-app-modemserver
          ln -s $(realpath ../modem-5g) package/luci-app-modemserver
          echo "=== Linked package ==="
          ls -la package/luci-app-modemserver/ | head -10

      - name: Download .config
        run: |
          cd sdk
          wget --timeout=60 -q "https://downloads.immortalwrt.org/releases/23.05.3/targets/rockchip/armv8/config.buildinfo" -O .config
          echo "CONFIG_PACKAGE_luci-app-modemserver=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "=== Config check ==="
          grep -E "luci-app-modemserver|luci-compat" .config

      - name: Update and install feeds
        run: |
          cd sdk
          ./scripts/feeds update -a 2>&1 | tail -10
          echo "=== Installing feeds ==="
          ./scripts/feeds install -a 2>&1 | tail -20

      - name: Pre-check package
        run: |
          cd sdk
          echo "=== Package Makefile ==="
          cat package/luci-app-modemserver/Makefile | head -20
          echo ""
          echo "=== Check feeds config ==="
          cat .config | grep -E "LUCI|modem" | head -10

      - name: Build package
        run: |
          cd sdk
          make defconfig 2>&1 | tail -5
          echo "=== Starting build ==="
          make -j$(nproc) package/luci-app-modemserver/compile V=99 2>&1 | tail -100

      - name: Find IPK files
        run: |
          echo "=== Searching for IPK files ==="
          find . -name "*.ipk" -type f 2>/dev/null
          echo "=== SDK bin directory ==="
          ls -la sdk/bin/ 2>/dev/null || echo "No bin dir"
          echo "=== Build directory ==="
          ls -la build_dir/ 2>/dev/null | head -10 || echo "No build_dir"

      - name: Collect IPK files
        run: |
          mkdir -p output
          find sdk -name "luci-app-modemserver_*.ipk" -type f -exec cp -v {} output/ \; 2>/dev/null
          find sdk -path "*/bin/packages/*" -name "luci-app-modemserver*.ipk" -type f -exec cp -v {} output/ \; 2>/dev/null
          echo "=== Output ==="
          ls -lh output/

      - name: Upload IPK artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages
          path: output/*.ipk
          retention-days: 30
